id: v8-migration-standing-team-bridge
name: V8 Migration Standing-Team Bridge
description: "Transitional V8 migration bundle that instantiates the runtime organization from standing-team manifests. Direct config/teams scanning remains migration-only compatibility."
template_version: v1alpha1
source_kind: standing_team_migration_input
kernel:
  mode: v8-migration-bridge
council:
  mode: v8-migration-bridge
provider_policy:
  posture: migration-bridge
  provider: local-ollama-dev
  kernel:
    role_providers:
      admin: local-ollama-dev
  council:
    role_providers:
      architect: local-ollama-dev
      coder: local-ollama-dev
      creative: local-ollama-dev
      sentry: local-ollama-dev
team_manifest_refs:
  - ../teams/admin.yaml
  - ../teams/agui-design-architect.yaml
  - ../teams/council.yaml
  - ../teams/genesis.yaml
  - ../teams/prime-architect.yaml
  - ../teams/prime-development.yaml
  - ../teams/telemetry.yaml

