name: CI

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Manual validation lane to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - repo-hygiene
          - core
          - interface
          - browser-smoke
          - helm-standards
      browser_spec:
        description: "Browser smoke spec path when lane is all or browser-smoke"
        required: false
        default: "e2e/specs/homepage.spec.ts"
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  HELM_VERSION: "v3.20.2"
  NEXT_TELEMETRY_DISABLED: "1"
  MYCELIS_API_KEY: "ci-local-only"
  MYCELIS_WEB_SESSION_SECRET: "ci-web-session-only"
  MYCELIS_LOCAL_ADMIN_USERNAME: "admin"
  MYCELIS_LOCAL_ADMIN_PASSWORD: "ci-local-only"
  MYCELIS_BREAK_GLASS_API_KEY: "ci-break-glass-only"
  MYCELIS_SEARCH_PROVIDER: "disabled"
  MYCELIS_PROVIDER_LOCAL_OLLAMA_DEV_ENABLED: "false"
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/workspace/tool-cache/playwright

jobs:
  repo-hygiene:
    name: Repo Hygiene, Docs, And Ops Tests
    if: ${{ inputs.lane == 'all' || inputs.lane == 'repo-hygiene' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python Tooling
        run: uv sync --all-packages --dev

      - name: Verify Invoke Entrypoints
        run: uv run inv ci.entrypoint-check

      - name: Enforce 300-Line No-Regression Gate
        run: uv run inv quality.max-lines --limit 300

      - name: Check Logging Contracts
        run: |
          uv run inv logging.check-schema
          uv run inv logging.check-topics

      - name: Run Python/Docs/Ops Tests
        run: uv run pytest -q

  core:
    name: Go Core
    if: ${{ inputs.lane == 'all' || inputs.lane == 'core' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Install Python Tooling
        run: uv sync --all-packages --dev

      - name: Run Go Tests
        working-directory: core
        run: go test ./... -count=1 -p 1

      - name: Run Go Vet
        working-directory: core
        run: go vet ./...

      - name: Compile Core Binary
        run: uv run inv core.compile

  interface:
    name: Interface Unit And Build
    if: ${{ inputs.lane == 'all' || inputs.lane == 'interface' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Install Python Tooling
        run: uv sync --all-packages --dev

      - name: Install Interface Dependencies
        working-directory: interface
        run: npm ci

      - name: Run Interface Unit Tests
        run: uv run inv interface.test

      - name: Build Interface
        run: uv run inv interface.build

      - name: Typecheck Interface
        run: uv run inv interface.typecheck

  browser-smoke:
    name: Browser Smoke Without Live Agentry
    if: ${{ inputs.lane == 'all' || inputs.lane == 'browser-smoke' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7

      - name: Set Up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Install Python Tooling
        run: uv sync --all-packages --dev

      - name: Install Interface Dependencies
        working-directory: interface
        run: npm ci

      - name: Install Chromium
        working-directory: interface
        run: npx playwright install --with-deps chromium

      - name: Run Homepage Browser Smoke
        run: >
          uv run inv interface.e2e
          --project=chromium
          --workers=1
          --server-mode=start
          --spec=${{ inputs.browser_spec }}

      - name: Upload Browser Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-smoke-artifacts
          path: |
            interface/test-results/
            interface/playwright-report/
            workspace/logs/
          retention-days: 7

  helm-standards:
    name: Helm And Kubernetes Standards
    if: ${{ inputs.lane == 'all' || inputs.lane == 'helm-standards' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up uv
        uses: astral-sh/setup-uv@v7

      - name: Set Up Helm
        shell: bash
        run: |
          tarball="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/${tarball}"
          curl -fsSLO "https://get.helm.sh/${tarball}.sha256sum"
          sha256sum -c "${tarball}.sha256sum"
          tar -xzf "${tarball}"
          sudo install linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install Python Tooling
        run: uv sync --all-packages --dev

      - name: Run Open-Standards Chart Gate
        run: >
          uv run inv k8s.standards
          --helm
          --values-file=charts/mycelis-core/values-enterprise.yaml
