name: Full Release Candidate

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: "Release candidate label"
        required: false
        type: string
      browser_spec:
        description: "Browser proof spec"
        required: true
        default: "e2e/specs/homepage.spec.ts"
        type: string
      include_source_api:
        description: "Run hosted PostgreSQL/NATS source API proof"
        required: true
        default: true
        type: boolean
      package_profile:
        description: "Helm packaging profile"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - enterprise
          - enterprise-windows-ai
      binary_target:
        description: "Core binary target set"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-amd64
          - linux-arm64
          - darwin-amd64
          - darwin-arm64
          - windows-amd64
      publish_images:
        description: "Build and push release container images"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: full-release-${{ github.ref }}-${{ inputs.release_label || github.run_number }}
  cancel-in-progress: false

env:
  CI: "true"
  HELM_VERSION: "v3.20.2"
  NEXT_TELEMETRY_DISABLED: "1"
  MYCELIS_API_KEY: "ci-local-only"
  MYCELIS_WEB_SESSION_SECRET: "ci-web-session-only"
  MYCELIS_LOCAL_ADMIN_USERNAME: "admin"
  MYCELIS_LOCAL_ADMIN_PASSWORD: "ci-local-only"
  MYCELIS_BREAK_GLASS_API_KEY: "ci-break-glass-only"
  MYCELIS_SEARCH_PROVIDER: "disabled"
  MYCELIS_PROVIDER_LOCAL_OLLAMA_DEV_ENABLED: "false"
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/workspace/tool-cache/playwright

jobs:
  source-gates:
    name: Source, Core, Interface, And Helm Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Set Up Helm
        shell: bash
        run: |
          tarball="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl -fsSLO "https://get.helm.sh/${tarball}"
          curl -fsSLO "https://get.helm.sh/${tarball}.sha256sum"
          sha256sum -c "${tarball}.sha256sum"
          tar -xzf "${tarball}"
          sudo install linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install Tooling
        run: |
          uv sync --all-packages --dev
          npm ci --prefix interface

      - name: Repo Hygiene And Python Tests
        run: |
          uv run inv ci.entrypoint-check
          uv run inv quality.max-lines --limit 300
          uv run inv logging.check-schema
          uv run inv logging.check-topics
          uv run pytest -q

      - name: Core Gate
        working-directory: core
        run: |
          go test ./... -count=1 -p 1
          go vet ./...

      - name: Interface Gate
        run: |
          uv run inv core.compile
          uv run inv interface.test
          uv run inv interface.build
          uv run inv interface.typecheck

      - name: Helm Standards Gate
        run: >
          uv run inv k8s.standards
          --helm
          --values-file=charts/mycelis-core/values-enterprise.yaml

  browser-proof:
    name: Authenticated Browser Proof
    needs: source-gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json
      - name: Install Tooling
        run: |
          uv sync --all-packages --dev
          npm ci --prefix interface
          npm --prefix interface run build
          npx --prefix interface playwright install --with-deps chromium
      - name: Run Browser Proof
        run: >
          uv run inv interface.e2e
          --project=chromium
          --workers=1
          --server-mode=start
          --spec=${{ inputs.browser_spec }}
      - name: Upload Browser Artifacts On Failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: full-release-browser-artifacts
          path: |
            interface/test-results/
            interface/playwright-report/
            workspace/logs/
          retention-days: 7

  source-api-proof:
    name: Hosted Source API Proof
    if: inputs.include_source_api == true
    needs: source-gates
    uses: ./.github/workflows/source-api-proof.yaml
    with:
      proof_mode: read-only

  package-release:
    name: Package Helm And Binaries
    needs:
      - browser-proof
      - source-api-proof
    if: always() && needs.browser-proof.result == 'success' && (needs.source-api-proof.result == 'success' || needs.source-api-proof.result == 'skipped')
    uses: ./.github/workflows/release.yaml
    secrets: inherit
    with:
      release_label: ${{ inputs.release_label }}
      publish_images: ${{ inputs.publish_images }}
      package_profile: ${{ inputs.package_profile }}

  package-binaries:
    name: Package Core Binaries
    needs:
      - browser-proof
      - source-api-proof
    if: always() && needs.browser-proof.result == 'success' && (needs.source-api-proof.result == 'success' || needs.source-api-proof.result == 'skipped')
    uses: ./.github/workflows/release-binaries.yaml
    secrets: inherit
    with:
      version_tag: ${{ inputs.release_label }}
      target: ${{ inputs.binary_target }}
      publish_release_assets: false
