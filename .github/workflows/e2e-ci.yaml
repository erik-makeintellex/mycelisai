name: E2E Tests

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "interface/**"
      - "ops/config.py"
      - "ops/interface.py"
      - ".npmrc"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.py"
      - ".github/workflows/e2e-ci.yaml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "interface/**"
      - "ops/config.py"
      - "ops/interface.py"
      - ".npmrc"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.py"
      - ".github/workflows/e2e-ci.yaml"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Invoke Dependencies
        run: uv sync --all-packages --dev

      # ── Frontend ───────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Install Dependencies
        working-directory: ./interface
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./interface
        run: npx playwright install --with-deps chromium firefox webkit
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/workspace/tool-cache/playwright

      - name: Build Next.js
        run: uv run inv interface.build

      - name: Run Playwright Tests
        run: uv run inv interface.e2e

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: interface/test-results/
          retention-days: 7
