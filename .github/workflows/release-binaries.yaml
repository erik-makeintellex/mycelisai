name: Release Core Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Optional version label override for the release artifacts"
        required: false
        type: string

jobs:
  build-release-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release label
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "label=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "label=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: Install Invoke Dependencies
        run: uv sync --all-packages --dev

      - name: Package Core Binary
        run: >
          uv run inv core.package
          --target-os=${{ matrix.goos }}
          --target-arch=${{ matrix.goarch }}
          --version-tag=${{ steps.release.outputs.label }}

      - name: Upload Binary Artifact Bundle
        uses: actions/upload-artifact@v4
        with:
          name: mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}*

      - name: Publish GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}*
