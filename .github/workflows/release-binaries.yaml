name: Release Core Binaries

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Optional version label override for the release artifacts"
        required: false
        type: string
      target:
        description: "Target binary set to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux-amd64
          - linux-arm64
          - darwin-amd64
          - darwin-arm64
          - windows-amd64
      publish_release_assets:
        description: "Publish artifacts to the GitHub Release when running from a tag"
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      version_tag:
        description: "Optional version label override for the release artifacts"
        required: false
        type: string
      target:
        description: "Target binary set to build"
        required: true
        default: "all"
        type: string
      publish_release_assets:
        description: "Publish artifacts to the GitHub Release when running from a tag"
        required: false
        default: false
        type: boolean

jobs:
  build-release-binaries:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      UV_HTTP_TIMEOUT: "120"
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release label
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.version_tag }}" ]; then
            echo "label=${{ inputs.version_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "label=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "label=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        uses: astral-sh/setup-uv@v7

      - name: Set up Go
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: core/go.sum

      - name: Install Invoke Dependencies
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        run: uv sync --all-packages --dev

      - name: Package Core Binary
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        run: >
          uv run inv core.package
          --target-os=${{ matrix.goos }}
          --target-arch=${{ matrix.goarch }}
          --version-tag=${{ steps.release.outputs.label }}

      - name: Upload Binary Artifact Bundle
        if: ${{ inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch) }}
        uses: actions/upload-artifact@v7
        with:
          name: mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}*

      - name: Publish GitHub Release Assets
        if: ${{ inputs.publish_release_assets == true && startsWith(github.ref, 'refs/tags/') && (inputs.target == 'all' || inputs.target == format('{0}-{1}', matrix.goos, matrix.goarch)) }}
        uses: softprops/action-gh-release@v3
        with:
          files: dist/mycelis-core-${{ steps.release.outputs.label }}-${{ matrix.goos }}-${{ matrix.goarch }}*
