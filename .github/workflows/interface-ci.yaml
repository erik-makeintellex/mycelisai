name: Interface CI

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "interface/**"
      - "ops/interface.py"
      - "ops/config.py"
      - ".npmrc"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.py"
      - ".github/workflows/interface-ci.yaml"

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Install Invoke Dependencies
        run: uv sync --all-packages --dev

      - name: Install Dependencies
        working-directory: ./interface
        run: npm ci

      - name: Lint
        run: uv run inv interface.lint

      - name: Type Check
        run: uv run inv interface.typecheck

      - name: Test
        run: uv run inv interface.test

  build:
    name: Build Production
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: interface/package-lock.json

      - name: Install Invoke Dependencies
        run: uv sync --all-packages --dev

      - name: Install Dependencies
        working-directory: ./interface
        # Using npm ci for clean install
        run: npm ci

      - name: Build
        run: uv run inv interface.build
