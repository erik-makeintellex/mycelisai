name: Release Packaging

on:
  workflow_dispatch:
    inputs:
      release_label:
        description: "Optional label for enterprise packaging artifacts"
        required: false
        type: string
      publish_images:
        description: "Also build and push container images after packaging verification"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  verify-enterprise-packaging:
    runs-on: ubuntu-latest
    outputs:
      release_label: ${{ steps.release.outputs.label }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release label
        id: release
        shell: bash
        run: |
          if [ -n "${{ inputs.release_label }}" ]; then
            echo "label=${{ inputs.release_label }}" >> "$GITHUB_OUTPUT"
          else
            echo "label=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install Invoke Dependencies
        run: uv sync --all-packages --dev

      - name: Verify Enterprise Helm Package
        run: >
          uv run inv k8s.deploy
          --verify-package
          --values-file=charts/mycelis-core/values-enterprise.yaml
          --package-output-dir=dist/helm/enterprise
          --release-label=${{ steps.release.outputs.label }}

      - name: Verify Enterprise Windows AI Helm Package
        run: >
          uv run inv k8s.deploy
          --verify-package
          --values-file=charts/mycelis-core/values-enterprise-windows-ai.yaml
          --package-output-dir=dist/helm/enterprise-windows-ai
          --release-label=${{ steps.release.outputs.label }}

      - name: Upload Enterprise Packaging Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release-packaging-${{ steps.release.outputs.label }}
          path: dist/helm/**

  build-and-push:
    if: inputs.publish_images == true
    needs: verify-enterprise-packaging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/mycelis/core
            ${{ env.REGISTRY }}/mycelis/interface

      - name: Build and push Core
        uses: docker/build-push-action@v5
        with:
          context: .
          file: core/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/mycelis/core:${{ needs.verify-enterprise-packaging.outputs.release_label }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Interface
        uses: docker/build-push-action@v5
        with:
          context: ./interface
          file: ./interface/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/mycelis/interface:${{ needs.verify-enterprise-packaging.outputs.release_label }}
          labels: ${{ steps.meta.outputs.labels }}
