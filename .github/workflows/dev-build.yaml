name: Dev Build

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Manual image tag to build"
        required: true
        default: "dev"
        type: string
      push_images:
        description: "Push images to GHCR after build"
        required: true
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: dev-build-${{ github.ref }}-${{ inputs.image_tag }}
  cancel-in-progress: false

jobs:
  build-and-push-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/mycelis/core
            ${{ env.REGISTRY }}/mycelis/interface
          tags: type=raw,value=dev

      - name: Build Core Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: core/Dockerfile
          push: ${{ inputs.push_images }}
          tags: ${{ env.REGISTRY }}/mycelis/core:${{ inputs.image_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_MODE=dev

      - name: Build Interface Image
        uses: docker/build-push-action@v7
        with:
          context: ./interface
          file: ./interface/Dockerfile
          push: ${{ inputs.push_images }}
          tags: ${{ env.REGISTRY }}/mycelis/interface:${{ inputs.image_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=development
