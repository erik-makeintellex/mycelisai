apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
data:
  cognitive.yaml: |-
{{ .Files.Get "config/cognitive.yaml" | nindent 4 }}
  policy.yaml: |-
{{ .Files.Get "config/policy.yaml" | nindent 4 }}
  homepage.yaml: |-
{{ .Files.Get "config/homepage.yaml" | nindent 4 }}
  v8-migration-standing-team-bridge.yaml: |-
{{ .Files.Get "config/templates/v8-migration-standing-team-bridge.yaml" | nindent 4 }}
  admin.yaml: |-
{{ .Files.Get "config/teams/admin.yaml" | nindent 4 }}
  agui-design-architect.yaml: |-
{{ .Files.Get "config/teams/agui-design-architect.yaml" | nindent 4 }}
  council.yaml: |-
{{ .Files.Get "config/teams/council.yaml" | nindent 4 }}
  genesis.yaml: |-
{{ .Files.Get "config/teams/genesis.yaml" | nindent 4 }}
  prime-architect.yaml: |-
{{ .Files.Get "config/teams/prime-architect.yaml" | nindent 4 }}
  prime-development.yaml: |-
{{ .Files.Get "config/teams/prime-development.yaml" | nindent 4 }}
  telemetry.yaml: |-
{{ .Files.Get "config/teams/telemetry.yaml" | nindent 4 }}
