# Enterprise self-hosted Kubernetes preset with a Windows-hosted AI endpoint.
# This keeps the chart enterprise-shaped while pointing the provider override at the Windows GPU host.

replicaCount: 1

serviceAccount:
  create: true

image:
  repository: registry.example.com/mycelis/core
  tag: v1.0.0
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: mycelis-registry

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: mycelis.example.com
      path: /
      pathType: Prefix
  tls:
    - secretName: mycelis-core-tls
      hosts:
        - mycelis.example.com

coreAuth:
  existingSecret: mycelis-core-auth

outputBlock:
  mode: cluster_generated

dataVolume:
  size: 5Gi
  storageClassName: standard

ai:
  textEndpoint: "http://<windows-ai-host>:11434/v1"

nats:
  jetstream:
    fileStore:
      pvc:
        storageClassName: standard

postgresql:
  primary:
    persistence:
      storageClass: standard
